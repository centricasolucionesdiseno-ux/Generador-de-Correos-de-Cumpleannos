<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet">
    <meta charset="utf-8">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Generador de Correos de Cumpleaños</title>
</head>
<body>
<div class="container">
    <div class="noselect">
        <a href="index.html" class="back-button">&larr; Volver a la selección</a>
        <h2>Generar Correo de Cumpleaños</h2>
        <p>1. Selecciona un mes para ver los cumpleañeros.</p>
        <p>2. El correo se generará automáticamente con la lista de empleados.</p>
        <p>3. Usa el botón "Copiar Correo" para copiar el contenido al portapapeles.</p>

        <div class="form-container">
            <div class="form-top-row">
                <div class="form-group full-width">
                    <label for="mesSelect">Selecciona el Mes *</label>
                    <select id="mesSelect" required>
                        <option value="" disabled selected>-- Elige un mes --</option>
                        <option value="0">Enero</option>
                        <option value="1">Febrero</option>
                        <option value="2">Marzo</option>
                        <option value="3">Abril</option>
                        <option value="4">Mayo</option>
                        <option value="5">Junio</option>
                        <option value="6">Julio</option>
                        <option value="7">Agosto</option>
                        <option value="8">Septiembre</option>
                        <option value="9">Octubre</option>
                        <option value="10">Noviembre</option>
                        <option value="11">Diciembre</option>
                    </select>
                </div>
            </div>
            <div class="generate-button-container">
                <button id="generar-btn">Generar Correo</button>
                <span id="generado"></span>
            </div>
        </div>
    </div>

    <!-- Contenedor para mostrar el correo generado -->
    <div id="resultado-wrapper" style="display: none;">
        <div class="copy-button-wrapper">
            <button id="copy-btn" class="action-button">Copiar Correo</button>
        </div>

        <div id="correo-container">
            <!-- Aquí se mostrará el correo generado -->
        </div>
    </div>
</div>

<script src="generar-correo.js"></script>
</body>
</html>
